name: CI

# Full test + compliance suite for the prsonal_app Flutter project, which lives
# in the prsonal_app/ subfolder of this repo.

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.4"

defaults:
  run:
    working-directory: prsonal_app

jobs:
  test:
    name: Analyze · Test · Spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Drift's in-memory test database loads libsqlite3.so (the unversioned
      # linker name lives in libsqlite3-dev).
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (lib strict; tests scoped)
        run: flutter analyze

      - name: Run tests
        run: flutter test --reporter expanded

      - name: Spec coverage gate
        run: bash scripts/check_spec_coverage.sh

  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: prsonal_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
