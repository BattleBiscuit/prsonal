name: CI

# Granular test + compliance suite for prsonal_app (lives in the prsonal_app/
# subfolder). Each check is its own job so failures are isolated and run in
# parallel. Generated code (*.g.dart) is committed, so most jobs use it directly;
# the verify-codegen job guards against it drifting out of sync.

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: prsonal_app

jobs:
  format:
    name: Format (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - run: dart format --output none --set-exit-if-changed lib

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - run: flutter analyze

  spec-coverage:
    name: Spec coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_spec_coverage.sh

  verify-codegen:
    name: Verify committed Drift codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - name: Regenerate
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Fail if generated code is stale
        run: |
          if ! git diff --quiet -- '**/*.g.dart'; then
            echo "::error::Committed *.g.dart is out of date. Run: dart run build_runner build --delete-conflicting-outputs"
            git --no-pager diff --stat -- '**/*.g.dart'
            exit 1
          fi

  test:
    name: Unit & widget tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlite3 (Drift in-memory tests)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: ./.github/actions/flutter-setup
      - run: flutter test --coverage --reporter expanded
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: prsonal_app/coverage/lcov.info
          if-no-files-found: warn

  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: ./.github/actions/flutter-setup
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: prsonal_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  # After a green build on main, patch-bump the latest vX.Y.Z tag and push the new
  # tag. The push triggers the Release workflow (see release.yml). The tag is the
  # source of truth for the version — pubspec.yaml is never consulted.
  #
  # NOTE: the tag MUST be pushed with a Personal Access Token (RELEASE_PAT secret),
  # not the default GITHUB_TOKEN. GitHub deliberately does not start a new workflow
  # run for events created by GITHUB_TOKEN, so a tag pushed with it would never fire
  # release.yml. Create a fine-grained PAT with "Contents: read and write" on this
  # repo and store it as the RELEASE_PAT secret.
  tag:
    name: Tag release
    needs: [format, analyze, spec-coverage, verify-codegen, test, build-debug]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to derive the next version
          token: ${{ secrets.RELEASE_PAT }}
      - name: Compute and push next tag
        working-directory: prsonal_app
        run: |
          latest="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)"
          latest="${latest:-v0.0.0}"
          ver="${latest#v}"
          major="${ver%%.*}"
          rest="${ver#*.}"
          minor="${rest%%.*}"
          patch="${rest##*.}"
          patch=$((patch + 1))
          tag="v${major}.${minor}.${patch}"
          echo "Latest tag: $latest -> new tag: $tag"
          git tag "$tag"
          git push origin "$tag"
