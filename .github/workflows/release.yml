name: Release

# On every push to main: derives the next version automatically (patch-bumps the
# latest vX.Y.Z git tag â€” the version in pubspec.yaml is ignored), builds a signed
# App Bundle (.aab, for the Play Store) and a signed APK (for direct download/
# sideload), tags the commit, attaches both binaries to a GitHub Release, and â€”
# when a Play service account is configured â€” uploads the bundle to the Play
# internal track.
#
# Versioning:
#   build-name   (Android versionName) = X.Y.(Z+1), derived from the latest tag
#   build-number (Android versionCode) = github.run_number (monotonic, never reused)
# Both are passed to `flutter build` via --build-name/--build-number, so the
# `version:` field in pubspec.yaml is never consulted.
#
# Required repository secrets (Settings â†’ Secrets and variables â†’ Actions):
#   ANDROID_KEYSTORE_BASE64    - `base64 -w0 upload-keystore.jks`
#   ANDROID_KEYSTORE_PASSWORD  - keystore (store) password
#   ANDROID_KEY_PASSWORD       - key password
#   ANDROID_KEY_ALIAS          - key alias (e.g. upload)
#   PLAY_SERVICE_ACCOUNT_JSON  - (optional) Play service-account JSON for auto-upload
#
# Without the keystore secrets the binaries still build (debug-signed) so the
# pipeline is testable before signing is set up â€” they just aren't Play-uploadable.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize releases so two pushes can't race on tag creation / version numbers.
concurrency:
  group: release
  cancel-in-progress: false

defaults:
  run:
    working-directory: prsonal_app

jobs:
  release:
    name: Build & publish versioned artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the tag and the GitHub Release
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to derive the next version

      - name: Determine next version
        id: version
        working-directory: prsonal_app
        run: |
          # Latest semver tag (vX.Y.Z); default to v0.0.0 if none exist yet.
          latest="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)"
          latest="${latest:-v0.0.0}"
          echo "Latest tag: $latest"

          ver="${latest#v}"
          major="${ver%%.*}"
          rest="${ver#*.}"
          minor="${rest%%.*}"
          patch="${rest##*.}"
          patch=$((patch + 1))

          version_name="${major}.${minor}.${patch}"
          tag="v${version_name}"
          build_number="${{ github.run_number }}"

          echo "Next version: $tag (build $build_number)"
          {
            echo "version_name=$version_name"
            echo "tag=$tag"
            echo "build_number=$build_number"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure release signing
        if: env.KEYSTORE_BASE64 != ''
        working-directory: prsonal_app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/upload-keystore.jks
          cat > key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - uses: ./.github/actions/flutter-setup

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build App Bundle (.aab)
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Build APK (.apk)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Stage versioned artifacts
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p dist
          cp build/app/outputs/bundle/release/app-release.aab "dist/prsonal-${TAG}.aab"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/prsonal-${TAG}.apk"
          ls -la dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prsonal-${{ steps.version.outputs.tag }}
          path: prsonal_app/dist/*
          if-no-files-found: error

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            prsonal_app/dist/prsonal-${{ steps.version.outputs.tag }}.aab
            prsonal_app/dist/prsonal-${{ steps.version.outputs.tag }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Publish to Play Store (internal track)
        if: env.PLAY_JSON != '' && env.KEYSTORE_BASE64 != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.prsonal.prsonal_app
          releaseFiles: prsonal_app/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
