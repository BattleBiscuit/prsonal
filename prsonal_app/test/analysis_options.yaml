# Test-scoped analyzer config. Production code (lib/) stays strict via the root
# analysis_options.yaml; here we waive a few cosmetic lints that are noisy in
# test scaffolding (unused test imports, throwaway `_` params, the deliberate
# `as dynamic` State access in a screen test, etc.) so `flutter analyze` is a
# clean CI gate without rewriting the test suite.
include: ../analysis_options.yaml

analyzer:
  errors:
    unnecessary_underscores: ignore
    unused_import: ignore
    unnecessary_import: ignore
    unused_element: ignore
    unused_element_parameter: ignore
    unused_local_variable: ignore
    sort_child_properties_last: ignore
    avoid_dynamic_calls: ignore
